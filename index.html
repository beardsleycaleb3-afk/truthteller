<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=350, height=550, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#060608">
  <link rel="manifest" href="./manifest.json">
  <title>truthteller</title>
  <style>
    :root{--bg:#060608;--panel:rgba(16,16,22,.88);--border:#23232a;--text:#e2e2e9;--muted:#727282;--blue:#3a76c4;--amber:#c48a3a;--purple:#8a3ac4}
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
    html,body{width:350px;height:550px;overflow:hidden;background:var(--bg);color:var(--text);touch-action:none;user-select:none}
    #app-shell{width:100%;height:100%;perspective:900px;overflow:hidden;transform-style:preserve-3d;background:radial-gradient(circle at 50% 20%,rgba(58,118,196,.16),transparent 40%),radial-gradient(circle at 50% 80%,rgba(138,58,196,.1),transparent 50%),var(--bg)}
    #canvas-container{position:absolute;inset:0;z-index:1;touch-action:none}
    .ui{position:absolute;inset:0;z-index:2;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:10px}
    .box{pointer-events:auto;width:100%;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;box-shadow:0 10px 30px rgba(0,0,0,.55);backdrop-filter:blur(12px)}
    .head{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px}
    h1{font-size:.95rem;letter-spacing:1.8px;font-weight:700;text-transform:lowercase}
    .ver{font-size:.62rem;background:rgba(58,118,196,.18);color:var(--blue);padding:2px 6px;border-radius:4px;letter-spacing:1px;border:1px solid rgba(58,118,196,.35);white-space:nowrap}
    p{font-size:.72rem;color:var(--muted);margin-top:4px}
    .row{display:flex;gap:8px;margin-top:10px}
    input[type=text]{flex:1;background:rgba(0,0,0,.55);border:1px solid var(--border);color:var(--text);padding:11px 10px;font-size:.95rem;border-radius:6px;text-transform:uppercase;letter-spacing:1px;text-align:center;outline:none}
    button{background:var(--blue);color:#fff;border:none;padding:0 14px;min-height:42px;font-weight:700;border-radius:6px;text-transform:uppercase;font-size:.72rem;letter-spacing:1px}
    .sec{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border)}
    .display{max-height:310px;overflow-y:auto;display:none;flex-direction:column;gap:10px}
    .display::-webkit-scrollbar{width:6px}
    .display::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .title{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:5px}
    .stream{display:flex;flex-direction:column;gap:8px}
    .card{background:rgba(0,0,0,.38);border:1px solid var(--border);border-radius:8px;display:flex;padding:9px;gap:10px;align-items:center}
    .card.sof{border-color:var(--amber)}
    .glyph{width:34px;height:34px;background:var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.05rem;flex-shrink:0}
    .card.sof .glyph{color:var(--amber);background:rgba(196,138,58,.15)}
    .det{flex:1;font-size:.8rem;line-height:1.35}
    .sub{font-size:.68rem;color:var(--muted);font-style:italic;margin-top:4px}
    .sum{background:rgba(0,0,0,.35);border-left:3px solid var(--blue);padding:10px;font-size:.82rem;line-height:1.45;border-radius:0 5px 5px 0}
  </style>
</head>
<body>
  <div id="app-shell">
    <div id="canvas-container"></div>
    <div class="ui">
      <div class="box">
        <div class="head">
          <div><h1>truthteller</h1><p>Spatial Context & Bracket Detection</p></div>
          <div class="ver">v018810</div>
        </div>
        <div class="row">
          <input id="matrixInput" type="text" placeholder="SUSPECT, MOON, JESUS..." autocomplete="off" inputmode="text">
          <button id="execBtn">Parse</button>
        </div>
        <div class="row">
          <button class="sec" id="copyBtn">Copy</button>
          <button class="sec" id="saveBtn">Download JSON</button>
        </div>
      </div>
      <div class="display box" id="displayPanel">
        <div class="title">Geometric Tokens Captured</div>
        <div class="stream" id="tokenStream"></div>
        <div class="title">Sequential Matrix Synthesis</div>
        <div class="sum" id="synthesisSummary"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const R={A:["Aleph's Ox-Lowing Breath","initiates with a primal stroke of leadership, birthing the beginning"],B:["Bet's House of Dwelling","establishes a balanced enclosure where structural stability houses the self"],C:["Gimel's Wandering Grace","acts as a creative bridge, weaving potential growth across transitions"],D:["Dalet's Threshold","fixes a firm entry point of stability, anchoring the structural foundation"],E:["Heh's Window of Wonder","pours enthusiastic energy through the lattice of the soul, revealing revelation"],F:["Vav's Hook of Family","binds the sequence together with nurturing stability, locking components"],G:["Zayin's Cutting Edge","introduces the spiritual blade of discernment, cleaving structural illusions"],H:["Chet's Enclosed Wall","fences in abundance, establishing a protective boundary that separates assets"],I:["Tet's Wheel of Completion","circles back with humanitarian integration, sealing the phrase with goodness"],J:["Yod's Hand of Action","grasps structural justice through targeted effort, shaping raw fate"],K:["Kaf's Open Illumination","awakens internal understanding, serving as an open vessel catching light"],L:["Lamed's Loyal Goad","guides the sequence via purposeful direction, urging the path forward"],M:["Mem's Practical Depths","flows through practical, material systems, reflecting environmental patterns"],N:["Nun's River of Life","links components through a quiet current of connectivity, swimming streams"],O:["Samekh's Firm Support","props up options and opportunities under a watchful eye, creating a stable pillar"],P:["Pe's Open Mouth","projects explicit perspective, pouring silent calculations out into clear expression"],Q:["Qof's Hidden Turn","questions the trajectory, initiating an analytical leap into unknown parameters"],R:["Resh's Beginning Gaze","renews the trajectory through deep reflection, turning prior cycles into fresh promises"],S:["Shin's Spiritual Fire","devours illusion with sharp intensity, clearing away systematic noise"],T:["Tav's Final Seal","transforms mortality into permanent structure, placing a cross of completion"],U:["Vav's Universal Hook","unites varied data points into cosmic wholeness, anchoring connectivity"],V:["Phi's Golden Force","uncoils vital living energy, driving dynamic execution like a living flame"],W:["Double Hook of Wisdom","weaves dual connection channels together, fusing fragments into absolute integration"],X:["Chi's Unknown Crossroads","introduces structural mystery, navigating the variable turning points"],Y:["Yod's Action Reborn","applies youthful vital energy to raw materials, actively working and shaping clay"],Z:["Zayin's Final Zenith","closes the dynamic loop at the absolute peak, bringing all operational cycles to peace"]};
    const F={S:["Final Shin (Terminal Soul)","seals the entire consciousness, locking the purified spiritual fire into permanent casing"],P:["Final Peh (Absolute Manifestation)","finalizes the spoken word into solid, undeniable reality, sealing perception permanently"],N:["Final Nun (Extended Gateway)","descends deep beneath the standard framework, projecting the stream into the absolute infinite"],M:["Final Mem (Closed Matrix)","closes the practical waters completely, locking down material systems into a hidden vault"],K:["Final Kaf (Illuminated Terminal)","extends the palm downward, grounding all gathered spiritual light directly into execution"]};
    const VOW=new Set(['A','E','I','O','U','Y']);
    let scene,camera,renderer,group,core,current=null,drag=false,spin=true,last={x:0,y:0};

    function parse(v){
      const a=String(v||'').split(/[
,;/|]+/).map(s=>s.trim()).filter(Boolean);
      const t=a.map((raw,i)=>{const c=(raw.toUpperCase().match(/[A-Z]/)||[''])[0],end=i===a.length-1,e=end&&F[c]?F[c]:R[c],sof=end&&F[c];return c?{raw,l:c,end,sof,t:e?e[0]:`Unknown Glyph (${c})`,d:e?e[1]:'unmapped token'}:null}).filter(Boolean);
      return {tokens:t,summary:{total:t.length,vowels:t.filter(x=>VOW.has(x.l)).length,finals:t.filter(x=>x.end&&x.sof).length,consonants:t.filter(x=>!VOW.has(x.l)).length,sequence:t.map(x=>x.l).join(' → ')}};
    }

    function render(tokens,s){
      const dp=document.getElementById('displayPanel'),st=document.getElementById('tokenStream'),sm=document.getElementById('synthesisSummary');
      if(!tokens.length){dp.style.display='none';st.innerHTML='';sm.textContent='Enter one or more tokens separated by commas, slashes, semicolons, or line breaks.';return}
      dp.style.display='flex';
      st.innerHTML=tokens.map((x,i)=>`<div class="card ${x.sof?'sof':''}"><div class="glyph">${x.l}</div><div class="det"><div><strong>${i+1}.</strong> ${x.t}</div><div>${x.d}</div><div class="sub">${x.raw}</div></div></div>`).join('');
      sm.innerHTML=`Total tokens: ${s.total}<br>Vowel-bearing tokens: ${s.vowels}<br>Final forms detected: ${s.finals}<br>Sequence: ${s.sequence||'—'}`;
    }

    function update(v){const p=parse(v);current={input:v,generatedAt:new Date().toISOString(),...p};render(p.tokens,p.summary)}
    function copy(){if(current) navigator.clipboard.writeText(JSON.stringify(current,null,2))}
    function save(){if(!current) return; const b=new Blob([JSON.stringify(current,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='truthteller-matrix.json';a.click();setTimeout(()=>URL.revokeObjectURL(u),500)}

    function init3D(){
      const c=document.getElementById('canvas-container');
      scene=new THREE.Scene();
      camera=new THREE.PerspectiveCamera(55,350/550,.1,1000); camera.position.set(0,.4,7.5); camera.lookAt(0,0,0);
      renderer=new THREE.WebGLRenderer({antialias:true,alpha:true}); renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2)); renderer.setSize(350,550,false); c.appendChild(renderer.domElement);
      scene.add(new THREE.AmbientLight(0xffffff,.9));
      const l1=new THREE.DirectionalLight(0x88aaff,1.4); l1.position.set(3,4,6); scene.add(l1);
      const l2=new THREE.DirectionalLight(0xffaacc,.8); l2.position.set(-4,-2,5); scene.add(l2);
      group=new THREE.Group(); scene.add(group);
      core=new THREE.Mesh(new THREE.IcosahedronGeometry(1.2,1), new THREE.MeshStandardMaterial({color:0x3a76c4,metalness:.25,roughness:.2,emissive:0x0b1a33})); group.add(core);
      const ring=new THREE.Mesh(new THREE.TorusGeometry(2,0.05,10,80), new THREE.MeshStandardMaterial({color:0x8a3ac4,metalness:.4,roughness:.25,emissive:0x14061d})); ring.rotation.x=Math.PI/2; group.add(ring);
      group.add(new THREE.Mesh(new THREE.OctahedronGeometry(1.85,0), new THREE.MeshStandardMaterial({color:0x181822,wireframe:true,transparent:true,opacity:.55})));
      onResize(); animate();
    }

    function onResize(){const dpr=Math.min(window.devicePixelRatio||1,2); renderer.setPixelRatio(dpr); renderer.setSize(350,550,false); camera.aspect=350/550; camera.updateProjectionMatrix()}
    function animate(){requestAnimationFrame(animate); if(group){if(spin&&!drag){group.rotation.y+=.008; group.rotation.x+=.002} core.rotation.z+=.003; group.scale.setScalar(1+Math.sin(performance.now()*.0012)*.01)} renderer.render(scene,camera)}

    function ui(){
      const input=document.getElementById('matrixInput'), exec=document.getElementById('execBtn');
      document.getElementById('copyBtn').addEventListener('click',copy);
      document.getElementById('saveBtn').addEventListener('click',save);
      exec.addEventListener('click',()=>update(input.value));
      input.addEventListener('input',()=>input.value.trim()?update(input.value):(current=null,render([], {total:0,vowels:0,finals:0,consonants:0,sequence:''})));
      const start=(x,y)=>{drag=true;spin=false;last={x,y}};
      const move=(x,y)=>{if(!drag)return; group.rotation.y+=(x-last.x)*0.01; group.rotation.x+=(y-last.y)*0.01; last={x,y}};
      const end=()=>{drag=false;spin=true};
      renderer.domElement.addEventListener('pointerdown',e=>start(e.clientX,e.clientY));
      window.addEventListener('pointermove',e=>move(e.clientX,e.clientY));
      window.addEventListener('pointerup',end); window.addEventListener('pointercancel',end);
    }

    function sw(){if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
    window.addEventListener('DOMContentLoaded',()=>{init3D();ui();document.getElementById('displayPanel').style.display='none';sw()});
  </script>
</body>
</html>
