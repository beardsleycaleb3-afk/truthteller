<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=350, height=550, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#060608">
  <link rel="manifest" href="./manifest.json">
  <title>truthteller</title>
  <style>
    :root {
      --bg:#060608;
      --panel:rgba(16,16,22,.88);
      --border:#23232a;
      --text:#e2e2e9;
      --muted:#727282;
      --blue:#3a76c4;
      --amber:#c48a3a;
      --purple:#8a3ac4;
    }
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:monospace;
      -webkit-tap-highlight-color:transparent;
    }
    html,body{
      width:350px;
      height:550px;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      touch-action:none;
      user-select:none;
    }
    #root,#app-shell{
      width:100%;
      height:100%;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 20%,rgba(58,118,196,.16),transparent 40%),
        radial-gradient(circle at 50% 80%,rgba(138,58,196,.1),transparent 50%),
        var(--bg);
    }
    canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
      z-index:1;
    }
    .ui{
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      padding:10px;
    }
    .box{
      pointer-events:auto;
      width:100%;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:10px;
      padding:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.55);
      backdrop-filter:blur(12px);
    }
    .head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    h1{
      font-size:.95rem;
      letter-spacing:1.8px;
      font-weight:700;
      text-transform:lowercase;
    }
    .ver{
      font-size:.62rem;
      background:rgba(58,118,196,.18);
      color:var(--blue);
      padding:2px 6px;
      border-radius:4px;
      letter-spacing:1px;
      border:1px solid rgba(58,118,196,.35);
      white-space:nowrap;
    }
    p{
      font-size:.72rem;
      color:var(--muted);
      margin-top:4px;
    }
    .row{
      display:flex;
      gap:8px;
      margin-top:10px;
    }
    input[type=text]{
      flex:1;
      background:rgba(0,0,0,.55);
      border:1px solid var(--border);
      color:var(--text);
      padding:11px 10px;
      font-size:.95rem;
      border-radius:6px;
      text-transform:uppercase;
      letter-spacing:1px;
      text-align:center;
      outline:none;
    }
    button{
      background:var(--blue);
      color:#fff;
      border:none;
      padding:0 14px;
      min-height:42px;
      font-weight:700;
      border-radius:6px;
      text-transform:uppercase;
      font-size:.72rem;
      letter-spacing:1px;
    }
    .sec{
      background:rgba(255,255,255,.08);
      color:var(--text);
      border:1px solid var(--border);
    }
    .display{
      max-height:310px;
      overflow-y:auto;
      display:none;
      flex-direction:column;
      gap:10px;
    }
    .display::-webkit-scrollbar{width:6px}
    .display::-webkit-scrollbar-thumb{
      background:var(--border);
      border-radius:3px;
    }
    .title{
      font-size:.68rem;
      text-transform:uppercase;
      letter-spacing:1px;
      color:var(--muted);
      border-bottom:1px solid var(--border);
      padding-bottom:5px;
    }
    .stream{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .card{
      background:rgba(0,0,0,.38);
      border:1px solid var(--border);
      border-radius:8px;
      padding:9px;
    }
    .card.sof{border-color:var(--amber)}
    .glyph{
      display:inline-flex;
      width:28px;
      height:28px;
      background:var(--border);
      border-radius:6px;
      align-items:center;
      justify-content:center;
      font-weight:700;
      font-size:1rem;
      margin-bottom:6px;
      color:var(--text);
    }
    .card.sof .glyph{
      color:var(--amber);
      background:rgba(196,138,58,.15);
    }
    .det{
      font-size:.8rem;
      line-height:1.35;
    }
    .sub{
      font-size:.68rem;
      color:var(--muted);
      font-style:italic;
      margin-top:4px;
    }
    .sum{
      background:rgba(0,0,0,.35);
      border-left:3px solid var(--blue);
      padding:10px;
      font-size:.82rem;
      line-height:1.45;
      border-radius:0 5px 5px 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    const { useEffect, useMemo, useRef, useState } = React;

    const R = {
      A:["Aleph's Ox-Lowing Breath","initiates with a primal stroke of leadership, birthing the beginning"],
      B:["Bet's House of Dwelling","establishes a balanced enclosure where structural stability houses the self"],
      C:["Gimel's Wandering Grace","acts as a creative bridge, weaving potential growth across transitions"],
      D:["Dalet's Threshold","fixes a firm entry point of stability, anchoring the structural foundation"],
      E:["Heh's Window of Wonder","pours enthusiastic energy through the lattice of the soul, revealing revelation"],
      F:["Vav's Hook of Family","binds the sequence together with nurturing stability, locking components"],
      G:["Zayin's Cutting Edge","introduces the spiritual blade of discernment, cleaving structural illusions"],
      H:["Chet's Enclosed Wall","fences in abundance, establishing a protective boundary that separates assets"],
      I:["Tet's Wheel of Completion","circles back with humanitarian integration, sealing the phrase with goodness"],
      J:["Yod's Hand of Action","grasps structural justice through targeted effort, shaping raw fate"],
      K:["Kaf's Open Illumination","awakens internal understanding, serving as an open vessel catching light"],
      L:["Lamed's Loyal Goad","guides the sequence via purposeful direction, urging the path forward"],
      M:["Mem's Practical Depths","flows through practical, material systems, reflecting environmental patterns"],
      N:["Nun's River of Life","links components through a quiet current of connectivity, swimming streams"],
      O:["Samekh's Firm Support","props up options and opportunities under a watchful eye, creating a stable pillar"],
      P:["Pe's Open Mouth","projects explicit perspective, pouring silent calculations out into clear expression"],
      Q:["Qof's Hidden Turn","questions the trajectory, initiating an analytical leap into unknown parameters"],
      R:["Resh's Beginning Gaze","renews the trajectory through deep reflection, turning prior cycles into fresh promises"],
      S:["Shin's Spiritual Fire","devours illusion with sharp intensity, clearing away systematic noise"],
      T:["Tav's Final Seal","transforms mortality into permanent structure, placing a cross of completion"],
      U:["Vav's Universal Hook","unites varied data points into cosmic wholeness, anchoring connectivity"],
      V:["Phi's Golden Force","uncoils vital living energy, driving dynamic execution like a living flame"],
      W:["Double Hook of Wisdom","weaves dual connection channels together, fusing fragments into absolute integration"],
      X:["Chi's Unknown Crossroads","introduces structural mystery, navigating the variable turning points"],
      Y:["Yod's Action Reborn","applies youthful vital energy to raw materials, actively working and shaping clay"],
      Z:["Zayin's Final Zenith","closes the dynamic loop at the absolute peak, bringing all operational cycles to peace"]
    };

    const F = {
      S:["Final Shin (Terminal Soul)","seals the entire consciousness, locking the purified spiritual fire into permanent casing"],
      P:["Final Peh (Absolute Manifestation)","finalizes the spoken word into solid, undeniable reality, sealing perception permanently"],
      N:["Final Nun (Extended Gateway)","descends deep beneath the standard framework, projecting the stream into the absolute infinite"],
      M:["Final Mem (Closed Matrix)","closes the practical waters completely, locking down material systems into a hidden vault"],
      K:["Final Kaf (Illuminated Terminal)","extends the palm downward, grounding all gathered spiritual light directly into execution"]
    };

    const VOW = new Set(['A','E','I','O','U','Y']);

    function App(){
      const canvasRef = useRef(null);
      const rafRef = useRef(0);
      const stateRef = useRef({x:175,y:275,dx:0.4,dy:0.25,spin:0,drag:false,lastX:0,lastY:0,px:175,py:275});
      const [input,setInput] = useState('');
      const [current,setCurrent] = useState(null);

      const parsed = useMemo(() => {
        const parts = String(input || '').split(/[
,;/|]+/).map(s => s.trim()).filter(Boolean);
        const tokens = parts.map((raw,i) => {
          const l = (raw.toUpperCase().match(/[A-Z]/) || [''])[0];
          if (!l) return null;
          const end = i === parts.length - 1;
          const e = end && F[l] ? F[l] : R[l];
          const sof = end && !!F[l];
          return { raw, l, end, sof, t: e ? e[0] : `Unknown Glyph (${l})`, d: e ? e[1] : 'unmapped token' };
        }).filter(Boolean);
        return {
          tokens,
          summary: {
            total: tokens.length,
            vowels: tokens.filter(x => VOW.has(x.l)).length,
            finals: tokens.filter(x => x.end && x.sof).length,
            consonants: tokens.filter(x => !VOW.has(x.l)).length,
            sequence: tokens.map(x => x.l).join(' → ')
          }
        };
      }, [input]);

      useEffect(() => {
        if (input.trim()) setCurrent({ input, generatedAt: new Date().toISOString(), ...parsed });
      }, [parsed, input]);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');

        const resize = () => {
          const w = 350, h = 550, dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          canvas.style.width = w + 'px';
          canvas.style.height = h + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        };

        const point = (e) => {
          const r = canvas.getBoundingClientRect();
          return { x: e.clientX - r.left, y: e.clientY - r.top };
        };

        const down = (e) => {
          stateRef.current.drag = true;
          const p = point(e);
          stateRef.current.lastX = p.x;
          stateRef.current.lastY = p.y;
          e.preventDefault();
        };

        const move = (e) => {
          if (!stateRef.current.drag) return;
          const p = point(e);
          stateRef.current.x += (p.x - stateRef.current.lastX);
          stateRef.current.y += (p.y - stateRef.current.lastY);
          stateRef.current.lastX = p.x;
          stateRef.current.lastY = p.y;
          e.preventDefault();
        };

        const up = () => { stateRef.current.drag = false; };

        resize();
        window.addEventListener('resize', resize, { passive: true });
        canvas.addEventListener('pointerdown', down, { passive: false });
        window.addEventListener('pointermove', move, { passive: false });
        window.addEventListener('pointerup', up, { passive: true });
        window.addEventListener('pointercancel', up, { passive: true });

        const draw = (t) => {
          const s = stateRef.current;
          const w = 350, h = 550;
          if (!s.drag) {
            s.x += s.dx;
            s.y += s.dy;
            if (s.x < 90 || s.x > 260) s.dx *= -1;
            if (s.y < 120 || s.y > 430) s.dy *= -1;
          }

          s.spin += 0.01;
          ctx.clearRect(0, 0, w, h);

          const g = ctx.createRadialGradient(w * 0.5, h * 0.2, 10, w * 0.5, h * 0.2, 260);
          g.addColorStop(0, 'rgba(58,118,196,.18)');
          g.addColorStop(1, 'rgba(6,6,8,0)');
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, w, h);

          ctx.save();
          ctx.translate(s.x, s.y);
          ctx.rotate(s.spin * 0.6);

          ctx.beginPath();
          ctx.strokeStyle = 'rgba(138,58,196,.78)';
          ctx.lineWidth = 3;
          ctx.arc(0, 0, 92, 0, Math.PI * 2);
          ctx.stroke();

          ctx.beginPath();
          ctx.strokeStyle = 'rgba(58,118,196,.92)';
          ctx.lineWidth = 2.2;
          ctx.arc(0, 0, 58, 0, Math.PI * 2);
          ctx.stroke();

          ctx.beginPath();
          for (let i = 0; i < 12; i++) {
            const a = i * (Math.PI * 2 / 12) + t * 0.001;
            const r = i % 2 ? 34 : 50;
            const x = Math.cos(a) * r;
            const y = Math.sin(a) * r;
            ctx.moveTo(x, y);
            ctx.arc(x, y, i % 2 ? 5 : 3.5, 0, Math.PI * 2);
          }
          ctx.fillStyle = 'rgba(58,118,196,.95)';
          ctx.fill();

          ctx.beginPath();
          ctx.moveTo(0, -68);
          ctx.lineTo(62, 0);
          ctx.lineTo(0, 68);
          ctx.lineTo(-62, 0);
          ctx.closePath();
          ctx.fillStyle = 'rgba(16,16,22,.82)';
          ctx.fill();
          ctx.strokeStyle = 'rgba(226,226,233,.9)';
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(-18, -18);
          ctx.lineTo(0, -36);
          ctx.lineTo(18, -18);
          ctx.lineTo(0, 0);
          ctx.closePath();
          ctx.strokeStyle = 'rgba(196,138,58,.82)';
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.restore();

          rafRef.current = requestAnimationFrame(draw);
        };

        rafRef.current = requestAnimationFrame(draw);

        return () => {
          cancelAnimationFrame(rafRef.current);
          window.removeEventListener('resize', resize);
          canvas.removeEventListener('pointerdown', down);
          window.removeEventListener('pointermove', move);
          window.removeEventListener('pointerup', up);
          window.removeEventListener('pointercancel', up);
        };
      }, []);

      const copy = () => current && navigator.clipboard.writeText(JSON.stringify(current, null, 2));

      const save = () => {
        if (!current) return;
        const blob = new Blob([JSON.stringify(current, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'truthteller-matrix.json';
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 500);
      };

      const onParse = () => {
        if (!input.trim()) return;
        setCurrent({ input, generatedAt: new Date().toISOString(), ...parsed });
      };

      return React.createElement(
        'div',
        { id: 'app-shell' },
        React.createElement('canvas', { ref: canvasRef }),
        React.createElement(
          'div',
          { className: 'ui' },
          React.createElement(
            'div',
            { className: 'box' },
            React.createElement(
              'div',
              { className: 'head' },
              React.createElement('div', null,
                React.createElement('h1', null, 'truthteller'),
                React.createElement('p', null, 'Spatial Context & Bracket Detection')
              ),
              React.createElement('div', { className: 'ver' }, 'v018810')
            ),
            React.createElement(
              'div',
              { className: 'row' },
              React.createElement('input', {
                type: 'text',
                value: input,
                onChange: e => setInput(e.target.value),
                placeholder: 'SUSPECT, MOON, JESUS...',
                autoComplete: 'off',
                inputMode: 'text'
              }),
              React.createElement('button', { onClick: onParse }, 'Parse')
            ),
            React.createElement(
              'div',
              { className: 'row' },
              React.createElement('button', { className: 'sec', onClick: copy }, 'Copy'),
              React.createElement('button', { className: 'sec', onClick: save }, 'Download JSON')
            )
          ),
          React.createElement(
            'div',
            { className: 'display box', style: { display: current ? 'flex' : 'none' } },
            React.createElement('div', { className: 'title' }, 'Geometric Tokens Captured'),
            React.createElement(
              'div',
              { className: 'stream' },
              current?.tokens.map((x, i) =>
                React.createElement(
                  'div',
                  { className: 'card ' + (x.sof ? 'sof' : ''), key: i },
                  React.createElement('div', { className: 'glyph' }, x.l),
                  React.createElement(
                    'div',
                    { className: 'det' },
                    React.createElement('div', null, React.createElement('strong', null, `${i + 1}. `), x.t),
                    React.createElement('div', null, x.d),
                    React.createElement('div', { className: 'sub' }, x.raw)
                  )
                )
              )
            ),
            React.createElement('div', { className: 'title' }, 'Sequential Matrix Synthesis'),
            React.createElement(
              'div',
              { className: 'sum' },
              current
                ? `Total tokens: ${current.summary.total}<br>Vowel-bearing tokens: ${current.summary.vowels}<br>Final forms detected: ${current.summary.finals}<br>Sequence: ${current.summary.sequence || '—'}`
                : 'Enter one or more tokens separated by commas, slashes, semicolons, or line breaks.'
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
