<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=350, height=550, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#060608">
  <link rel="manifest" href="./manifest.json">
  <title>truthteller</title>
  <style>
    :root {
      --bg-main: #060608;
      --panel-bg: rgba(16, 16, 22, 0.88);
      --border-color: #23232a;
      --text-primary: #e2e2e9;
      --text-muted: #727282;
      --accent-blue: #3a76c4;
      --accent-amber: #c48a3a;
      --accent-purple: #8a3ac4;
      --accent-glow: rgba(58, 118, 196, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 350px;
      height: 550px;
      overflow: hidden;
      background: var(--bg-main);
      color: var(--text-primary);
      touch-action: none;
      user-select: none;
    }

    body {
      position: relative;
    }

    #app-shell {
      width: 100%;
      height: 100%;
      perspective: 900px;
      overflow: hidden;
      transform-style: preserve-3d;
      background:
        radial-gradient(circle at 50% 20%, rgba(58,118,196,0.16), transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(138,58,196,0.10), transparent 50%),
        var(--bg-main);
    }

    #canvas-container {
      position: absolute;
      inset: 0;
      z-index: 1;
      transform-style: preserve-3d;
      touch-action: none;
    }

    .ui-wrapper {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 10px;
    }

    .interactive-element {
      pointer-events: auto;
    }

    .control-panel, .display-panel {
      width: 100%;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 0.95rem;
      letter-spacing: 1.8px;
      font-weight: 700;
      text-transform: lowercase;
    }

    .version-badge {
      font-size: 0.62rem;
      background: rgba(58, 118, 196, 0.18);
      color: var(--accent-blue);
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 1px;
      border: 1px solid rgba(58, 118, 196, 0.35);
      white-space: nowrap;
    }

    .header p {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .input-row, .action-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    input[type="text"] {
      flex: 1;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 11px 10px;
      font-size: 0.95rem;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      outline: none;
    }

    .exec-btn {
      background: var(--accent-blue);
      color: #fff;
      border: none;
      padding: 0 14px;
      min-height: 42px;
      font-weight: 700;
      border-radius: 6px;
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: 1px;
    }

    .secondary-btn {
      background: rgba(255,255,255,0.08);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .display-panel {
      max-height: 310px;
      overflow-y: auto;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .display-panel::-webkit-scrollbar {
      width: 6px;
    }

    .display-panel::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }

    .section-title {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 5px;
    }

    .token-stream {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .token-card {
      background: rgba(0, 0, 0, 0.38);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      display: flex;
      padding: 9px;
      gap: 10px;
      align-items: center;
      transform-style: preserve-3d;
    }

    .token-card.sof { border-color: var(--accent-amber); }
    .token-card.brk { border-color: var(--accent-purple); }

    .token-glyph {
      width: 34px;
      height: 34px;
      background: var(--border-color);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    .token-card.sof .token-glyph {
      color: var(--accent-amber);
      background: rgba(196,138,58,0.15);
    }

    .token-card.brk .token-glyph {
      color: var(--accent-purple);
      background: rgba(138,58,196,0.15);
    }

    .token-details {
      flex: 1;
      font-size: 0.8rem;
      line-height: 1.35;
    }

    .sub-phonetic {
      font-size: 0.68rem;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 4px;
    }

    .synthesis-summary {
      background: rgba(0, 0, 0, 0.35);
      border-left: 3px solid var(--accent-blue);
      padding: 10px;
      font-size: 0.82rem;
      line-height: 1.45;
      border-radius: 0 5px 5px 0;
    }
  </style>
</head>
